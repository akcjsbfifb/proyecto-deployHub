services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deployhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    ports:
      - "${PUERTO_BACKEND}:3001"
    env_file: ./backend/.env
    depends_on:
      - postgres
  frontend:
    build: ./frontend
    ports:
      - "${PUERTO_FRONTEND}:3000"
    env_file: ./frontend/.env

volumes:
  pgdata:
