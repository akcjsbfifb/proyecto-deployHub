services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deployhub
    ports:
      - "${PUERTO_POSTGRES:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deployhub"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    ports:
      - "${PUERTO_BACKEND:-3001}:3001"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports:
      - "${PUERTO_FRONTEND:-3000}:3000"
    env_file: ./frontend/.env
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  pgdata:
